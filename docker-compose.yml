services:
  app:
    image: gatso/nexgraph:latest
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nexgraph
      DB_POOL_MIN: 2
      DB_POOL_MAX: 10
      LOG_LEVEL: info
      API_PREFIX: /api/v1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - nexgraph-repos:/tmp/nexgraph
      - ./testrepos:/repos:ro
    restart: unless-stopped

  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexgraph
    ports:
      - "5432:5432"
    volumes:
      - nexgraph-data:/var/lib/postgresql
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nexgraph-data:
  nexgraph-repos:
